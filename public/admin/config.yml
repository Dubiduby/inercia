backend:
  name: git-gateway
  branch: main

# For local development testing
local_backend: true

media_folder: "public/images"
public_folder: "/images"

# i18n configuration
i18n:
  structure: multiple_folders
  locales: [es, en]
  default_locale: es

collections:
  # Site Settings
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "src/data/site.json"
        fields:
          - { name: "title", label: "Site Title", widget: "string" }
          - { name: "description", label: "Site Description", widget: "text" }
          - { name: "email", label: "Contact Email", widget: "string" }
          - { name: "whatsapp", label: "WhatsApp Number", widget: "string", hint: "Phone number without + or spaces" }
          - { name: "backgroundImage", label: "Imagen de Fondo", widget: "image", required: false, hint: "Imagen que cubre toda la página. Tamaño: 1920x2800px (alta para cubrir móvil y desktop). Formato: WebP. Peso máx: 800KB. Optimiza en https://squoosh.app" }
          - label: "Social Media"
            name: "social"
            widget: "object"
            fields:
              - { name: "facebook", label: "Facebook URL", widget: "string", required: false }
              - { name: "instagram", label: "Instagram URL", widget: "string", required: false }
          - label: "SEO - Datos para Google"
            name: "seo"
            widget: "object"
            hint: "Estos datos ayudan a Google a entender mejor tu negocio y pueden hacer que aparezcas con información enriquecida en los resultados de búsqueda (estrellas, ubicación, servicios, etc.)"
            fields:
              - { name: "genres", label: "Géneros musicales", widget: "list", default: ["Pop", "Rock", "Jazz", "Soul"], hint: "Lista de estilos musicales que tocáis. Ayuda a aparecer en búsquedas como 'grupo de jazz para bodas'" }
              - { name: "areaServed", label: "Zona de servicio", widget: "string", default: "España", hint: "Área geográfica donde ofrecéis servicios. Ej: Madrid, Cataluña, España, Europa..." }
              - { name: "city", label: "Ciudad base", widget: "string", default: "Madrid", hint: "Ciudad donde está basado el grupo. Mejora el SEO local" }
              - { name: "country", label: "País", widget: "string", default: "ES", hint: "Código de país (ES para España, FR para Francia, etc.)" }

  # Hero Section
  - name: "hero"
    label: "Hero Section"
    files:
      - name: "hero-es"
        label: "Hero (Español)"
        file: "src/data/hero/es.json"
        fields:
          - { name: "title", label: "Título", widget: "string" }
          - { name: "subtitle", label: "Subtítulo", widget: "text" }
          - { name: "videoUrl", label: "Video del Hero", widget: "file", hint: "Sube un video (.mp4 recomendado). Máximo 10MB." }
          - { name: "ctaText", label: "Texto del Botón", widget: "string" }
      - name: "hero-en"
        label: "Hero (English)"
        file: "src/data/hero/en.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "subtitle", label: "Subtitle", widget: "text" }
          - { name: "videoUrl", label: "Hero Video", widget: "file", hint: "Upload a video (.mp4 recommended). Max 10MB." }
          - { name: "ctaText", label: "Button Text", widget: "string" }

  # About Section
  - name: "about"
    label: "About Section"
    files:
      - name: "about-es"
        label: "About (Español)"
        file: "src/data/about/es.json"
        fields:
          - { name: "title", label: "Título", widget: "string" }
          - { name: "content", label: "Contenido", widget: "markdown" }
      - name: "about-en"
        label: "About (English)"
        file: "src/data/about/en.json"
        fields:
          - { name: "title", label: "Title", widget: "string" }
          - { name: "content", label: "Content", widget: "markdown" }

  # Services (i18n)
  - name: "services"
    label: "Services"
    label_singular: "Service"
    folder: "src/data/services"
    extension: "json"
    format: "json"
    create: true
    identifier_field: "title"
    i18n: true
    summary: "Order: {{order}} - {{title}}"
    sortable_fields: ["order", "title"]
    fields:
      - { name: "title", label: "Service Title", widget: "string", i18n: true }
      - { name: "subtitle", label: "Subtitle", widget: "string", required: false, i18n: true }
      - { name: "description", label: "Description", widget: "text", i18n: true }
      - { name: "tags", label: "Tags", widget: "list", i18n: true, hint: "Lista de tags (ej: Bodas, Toda España)" }
      - { name: "youtubeVideoId", label: "YouTube Video ID", widget: "string", required: false, i18n: duplicate, hint: "ID del video (la parte después de v= en la URL)" }
      - { name: "backgroundImage", label: "Background Image", widget: "image", required: false, i18n: duplicate, hint: "Imagen de fondo del acordeón" }
      - { name: "order", label: "Display Order", widget: "number", value_type: "int", default: 1, i18n: duplicate }

  # Gallery
  - name: "gallery"
    label: "Gallery"
    label_singular: "Media"
    folder: "src/data/gallery"
    create: true
    identifier_field: "alt"
    summary: "Order: {{order}} - {{alt}}"
    sortable_fields: ["order", "alt", "caption"]
    fields:
      - { name: "image", label: "Imagen o Video", widget: "file", required: false, hint: "Formatos: WebP (recomendado), JPG o PNG para imágenes (máx. 500KB). MP4 para videos (máx. 5MB). Tamaño: 1200x800px. Optimiza imágenes en https://squoosh.app" }
      - { name: "youtubeUrl", label: "Video de YouTube (opcional)", widget: "string", required: false, hint: "URL completa del video de YouTube. Si se proporciona, se mostrará en lugar de la imagen/video subido" }
      - { name: "alt", label: "Texto alternativo (Alt Text)", widget: "string", hint: "Describe brevemente qué se ve en la imagen. Ej: 'Inercia tocando en boda en Hotel Ritz'. Esto ayuda a Google a indexar tus imágenes y mejora la accesibilidad para personas con discapacidad visual" }
      - { name: "caption", label: "Pie de foto", widget: "string", required: false, hint: "Texto opcional que aparece debajo de la imagen. Ej: 'Boda de María y Juan, 2024'" }
      - { name: "order", label: "Orden", widget: "number", value_type: "int", default: 1, hint: "Número para ordenar las imágenes. Las de número más bajo aparecen primero" }

  # Client/Venue Logos
  - name: "logos"
    label: "Client Logos"
    label_singular: "Logo"
    folder: "src/data/logos"
    create: true
    identifier_field: "name"
    summary: "Order: {{order}} - {{name}}"
    sortable_fields: ["order", "name"]
    fields:
      - { name: "name", label: "Client Name", widget: "string" }
      - { name: "logo", label: "Logo Image", widget: "image" }
      - { name: "order", label: "Display Order", widget: "number", value_type: "int", default: 1 }
